  <path d="M10,152 C22,146 38,148 48,153"/>
  <path d="M14,161 C27,154 41,157 53,160"/>

  <!-- ── BAR CHART ── -->
  <!-- Baseline -->
  <line x1="150" y1="172" x2="222" y2="172"/>
  <!-- Bar 1 (short) -->
  <rect x="154" y="151" width="14" height="21"/>
  <!-- Bar 2 (medium) -->
  <rect x="172" y="135" width="14" height="37"/>
  <!-- Bar 3 (tall) -->
  <rect x="190" y="116" width="14" height="56"/>

  <!-- ── GROWTH ARROW ── -->
