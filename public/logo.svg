  <!-- ── NECK ── -->
  <line x1="103" y1="92" x2="101" y2="106"/>
  <line x1="123" y1="92" x2="125" y2="106"/>

  <!-- ── SUIT BODY ── -->
  <path d="M101,106 C85,112 70,120 60,172"/>
  <path d="M125,106 C141,112 156,120 166,172"/>
  <line x1="60" y1="172" x2="166" y2="172"/>

  <!-- ── LAPELS ── -->
  <path d="M101,106 L93,126 L113,134"/>
  <path d="M125,106 L133,126 L113,134"/>

  <!-- ── TIE ── -->
